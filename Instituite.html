        class Instituite{

            constructor(instid, instname, instaddress, instcontact){
                this.id = instid;
                this.name = instname;
                this.address = instaddress;
                this.contact = instcontact;

            }
            instdetails(){
                document.write("Id:" + this.id + "<br>");
                document.write("Name:" + this.name + "<br>");
                document.write("Address:" + this.address + "<br>");
                document.write("Contact:" + this.contact + "<br>");
            }
        }
        obj = new Instituite(101, "Aniket", "Ghansoli", 8767042498)
        obj.instdetails();
    </script>
