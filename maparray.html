<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <script>
        var arr=[2,7,8 ,9,22]
        var newarr=arr.map((value)=> value+2)// Map method is used to create new array by transforming 
        document.write(newarr+"<br>")
        var evenarr=arr.filter((value)=> value%2==0)
        document.write(evenarr)
    </script>
</body>
</html>
