<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Withdrawal</title>
    <script>
        var amount = parseInt(prompt("Enter amount to withdraw:"));

        if (isNaN(amount) || amount <= 0) {
            alert("Invalid amount!");
        } else if (amount % 100 !== 0) {
            alert("Please enter amount in multiples of 100");
        } else {
            var note2000 = 0, note500 = 0, note200 = 0, note100 = 0;

            if (amount >= 2000) {
                note2000 = Math.floor(amount / 2000);
                amount = amount % 2000;
            }
            if (amount >= 500) {
                note500 = Math.floor(amount / 500);
                amount = amount % 500;
            }
            if (amount >= 200) {
                note200 = Math.floor(amount / 200);
                amount = amount % 200;
            }
            if (amount >= 100) {
                note100 = Math.floor(amount / 100);
                amount = amount % 100;
            }

            alert(
                "2000 notes: " + note2000 +
                "\n500 notes: " + note500 +
                "\n200 notes: " + note200 +
                "\n100 notes: " + note100
            );
        }
    </script>
</head>

<body>
</body>

</html>
