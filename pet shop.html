<!DOCTYPE html>
<html>
<head>
    <title>Pet Shop</title>
</head>
<body>
<script>
    var breed = prompt("Enter pet breed : ")

    switch (breed) {
        case "dog":
            var dogAge = parseInt(prompt("Enter dog's age:"));
            switch (dogAge) {
                case 1:
                    alert("Breed: Golden Retriever, Age: 4 Months, Price: ₹15,000-25,000");
                    break;
                case 2:
                    alert("Breed: Bulldog, Age:7 Month, Price: ₹17,000-30,000");
                    break;
                 case 3:
                    alert("Breed: , Age:7 Month, Price: ₹17,000-30,000");
                    break;
                default:
                    alert("Invalid dog age entered!");
                    break;
            }
            break;

        case "cat":
            var catAge = parseInt(prompt("Enter cat's age:"));
            switch (catAge) {
                case 1:
                    alert("Breed: Persian Cat, Age: 2 Month, Price: 15,000-50,000");
                    break;
                case 2:
                    alert("Breed: Siamese Cat, Age: 5 Month, Price: 20,000-60,000");
                    break;
                default:
                    alert("Invalid cat age entered!");
                    break;
            }
            break;
            case "birds":
            var birdAge = parseInt(prompt("Enter birds's age (1 or 2):"));
            switch (birdAge) {
                case 1:
                    alert("Breed: Lovebird, Age: 2 Month, Price: 2,000-10,000");
                    break;
                case 2:
                    alert("Breed: African Grey Parrot, Age: 1.5 Month, Price: 1,50,000-3,50,000");
                    break;
                default:
                    alert("Invalid bird age entered!");
                    break;
            }
            break;
            case "fish":
            var fishAge = parseInt(prompt("Enter fish's age (1 or 2):"));
            switch (fishAge) {
                case 1:
                    alert("Breed: Golden Fish, Age: 1 Month, Price: ₹3000");
                    break;
                case 2:
                    alert("Breed: Cat Fish, Age: 6 Month, Price: ₹4500");
                    break;
                default:
                    alert("Invalid fish age entered!");
                    break;
            }
            break;

        default:
            alert("Invalid breed entered!");
            break;
    }
</script>
</body>
</html>
