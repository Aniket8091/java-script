<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var disc = parseInt(prompt("Enter the amount: "));
        
        if (disc >= 5000) {
            alert("80% discount");
        }
        else if (disc >= 3000) {
            alert("60% discount");
        }
        else if (disc >= 2000) {
            alert("50% discount");
        }
        else if (disc >= 1000) {
            alert("35% discount");
        }
        else {
            alert("12% discount");
        }
    </script>
</head>
<body>
    
</body>
</html>
