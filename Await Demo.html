    <title>Document</title>
    <script>
        async  function asynDemo(){
             let prom = new Promise((resolve, reject) => {
            setTimeout(()=>{

            let success = true
            if (success) {
                resolve("success")
            } else {
                reject("Rejected")
            }
        },3000)
        })
        prom
        .then((data)=>{
            console.log(data);
        })
        .catch((error)=>{
            console.log(error);
        })
        
        let promawait = await prom
        console.log(promawait)
        console.log("Hi this is console")
    }
    asynDemo()
    </script>
