<!DOCTYPE html>
<html>

<head>
    <title>Mouseover</title>
</head>

<body>
    <h2 id="myText" onmouseover="changeColor()" onmouseout="resetColor()">Aniket</h2>

    <script>
        function changeColor() {
            document.getElementById("myText").style.paragraph = "date";
        }

        function resetColor() {
            document.getElementById("myText").style.color = "yellow"; 
        }
    </script>
</body>

</html>
